<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Risk Management Depart | Financial MIS Dashboard Trend Analysis</title>
    <link rel="icon" type="image/png" href="https://scontent.fktm21-2.fna.fbcdn.net/v/t39.30808-6/347811471_733097998551692_7711165472110549120_n.jpg?_nc_cat=105&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=R01Dd6Pzi2AQ7kNvwFdjkVd&_nc_oc=Adr_XMo9JLZ9qPesdTzIHAmax244XNsg0BfAd7QyyRY0Hlq3IXgjCSTDqBDOVsReYsKHgIpsBUwi4kf_g5xs2AUW&_nc_zt=23&_nc_ht=scontent.fktm21-2.fna&_nc_gid=bdW__kaZFoqZDH8NdG6aAQ&_nc_ss=7a30f&oh=00_AfxDToFoMSjTye7OyJHn_af0ITK2c5qiD5X4a4erT--5Sg&oe=69C48323">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 20% 30%, #070b17, #020408);
            color: #f0f3ff;
            padding: 28px 32px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 40%, rgba(59,130,246,0.08) 1px, transparent 1px),
                radial-gradient(circle at 75% 85%, rgba(0,255,200,0.06) 1px, transparent 1px);
            background-size: 40px 40px, 35px 35px;
            pointer-events: none;
            z-index: 0;
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 22s infinite alternate ease-in-out;
        }
        .orb1 { width: 55vw; height: 55vw; background: #2b6ef0; top: -25vh; right: -15vw; animation-duration: 28s; }
        .orb2 { width: 45vw; height: 45vw; background: #b24592; bottom: -20vh; left: -15vw; animation-duration: 24s; animation-delay: -6s; }
        .orb3 { width: 40vw; height: 40vw; background: #00d4ff; bottom: 25vh; right: 20vw; animation-duration: 32s; opacity: 0.18; }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(3%, 5%) scale(1.08); }
        }
        
        .header {
            position: relative;
            z-index: 15;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 20px 32px;
            margin-bottom: 35px;
            background: rgba(8, 14, 26, 0.65);
            backdrop-filter: blur(22px);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 212, 255, 0.45);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .header:hover {
            border-color: rgba(0, 230, 250, 0.9);
            box-shadow: 0 25px 45px -12px #00a6ff50;
            transform: translateY(-2px);
        }
        .brand { display: flex; align-items: center; gap: 20px; }
        .brand img { 
            height: 54px; 
            width: auto; 
            border-radius: 20px; 
            box-shadow: 0 12px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .brand img:hover { transform: scale(1.02) rotate(0.5deg); }
        .brand h2 {
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #9acdff, #5f9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.7rem;
            letter-spacing: -0.5px;
        }
        
        .header-right-decoration {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .blinking-image {
            height: 48px;
            width: auto;
            border-radius: 16px;
            box-shadow: 0 0 10px rgba(0, 255, 200, 0.5);
            animation: blinkPulse 1.2s ease-in-out infinite;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 200, 0.6);
        }
        .blinking-image:hover {
            animation: none;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.9);
        }
        @keyframes blinkPulse {
            0% { opacity: 0.6; box-shadow: 0 0 0px rgba(0, 255, 200, 0.3); border-color: rgba(0, 255, 200, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 18px rgba(0, 255, 200, 0.9); border-color: rgba(0, 255, 200, 1); transform: scale(1.02); }
            100% { opacity: 0.6; box-shadow: 0 0 0px rgba(0, 255, 200, 0.3); border-color: rgba(0, 255, 200, 0.4); }
        }
        
        .controls { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
        .glow-select, .file-upload-label {
            background: rgba(20, 28, 48, 0.85);
            border: 1px solid rgba(72, 187, 255, 0.6);
            padding: 10px 26px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
            font-family: 'Inter', monospace;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .glow-select:hover, .file-upload-label:hover {
            background: rgba(48, 100, 170, 0.9);
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59,130,246,0.4);
        }
        input[type="file"] { display: none; }
        .file-info {
            background: linear-gradient(135deg, rgba(0, 255, 150, 0.2), rgba(0, 180, 255, 0.1));
            border-radius: 60px;
            padding: 6px 24px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border-left: 3px solid #2effb0;
            backdrop-filter: blur(8px);
            animation: softPulse 2s infinite;
        }
        @keyframes softPulse {
            0% { border-left-color: #2effb0; box-shadow: 0 0 0 0 #2effb030; }
            100% { border-left-color: #aaffdd; box-shadow: 0 0 8px 2px #2effb080; }
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(0,0,0,0.5);
            padding: 6px 24px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 28px;
            margin: 30px 0 25px;
            position: relative;
            z-index: 8;
        }
        .premium-card {
            background: linear-gradient(145deg, rgba(18, 26, 48, 0.85), rgba(8, 12, 24, 0.95));
            backdrop-filter: blur(14px);
            border-radius: 38px;
            padding: 26px 24px;
            border: 1px solid rgba(80, 180, 255, 0.3);
            box-shadow: 0 20px 35px -14px rgba(0,0,0,0.7);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            position: relative;
            overflow: hidden;
            word-wrap: break-word;
        }
        .premium-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.1), transparent 70%);
            pointer-events: none;
        }
        .premium-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(0, 220, 255, 0.85);
            box-shadow: 0 32px 55px -18px #00a6ff90;
        }
        .card-title {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: #cae5ff;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-value {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #d4edff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 14px;
            letter-spacing: -0.5px;
            line-height: 1.2;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        /* Handle very large numbers with smaller font */
        .card-value.large-number {
            font-size: 1.5rem;
        }
        .trend {
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 16px;
            border-radius: 40px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
        }
        .trend-up { color: #3effa0; text-shadow: 0 0 6px #3effa060; }
        .trend-down { color: #ff8080; text-shadow: 0 0 6px #ff808060; }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 32px;
            margin-top: 45px;
            position: relative;
            z-index: 8;
        }
        .chart-lux-card {
            background: rgba(6, 12, 24, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 24px 20px;
            border: 1px solid rgba(0, 255, 210, 0.3);
            transition: all 0.4s ease;
            box-shadow: 0 18px 35px -14px rgba(0,0,0,0.6);
        }
        .chart-lux-card:hover {
            border-color: #0ff5aa;
            transform: translateY(-6px);
            box-shadow: 0 30px 50px -22px cyan;
        }
        .snapshot-header {
            margin: 55px 0 28px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 18px;
        }
        .snapshot-title i {
            font-size: 34px;
            color: #3b82f6;
            background: rgba(59,130,246,0.2);
            padding: 14px;
            border-radius: 28px;
        }
        .sheet-badge {
            background: rgba(0, 200, 200, 0.2);
            padding: 8px 30px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid rgba(0, 220, 210, 0.55);
            backdrop-filter: blur(8px);
        }
        .premium-table-container {
            background: linear-gradient(135deg, rgba(10, 20, 38, 0.85), rgba(4, 8, 20, 0.98));
            backdrop-filter: blur(22px);
            border-radius: 44px;
            border: 1px solid rgba(72, 187, 255, 0.4);
            overflow: hidden;
        }
        .table-wrapper { overflow-x: auto; max-height: 68vh; overflow-y: auto; }
        .premium-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .premium-table th {
            text-align: left;
            padding: 20px 24px;
            font-weight: 800;
            text-transform: uppercase;
            color: #e8f3ff;
            background: linear-gradient(135deg, rgba(25, 45, 75, 0.98), rgba(15, 28, 50, 0.98));
            border-bottom: 2px solid rgba(0, 212, 255, 0.7);
        }
        .premium-table td {
            padding: 15px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .premium-table tbody tr:hover { background: rgba(0, 200, 255, 0.12); }
        .currency-value { color: #b794f4; font-weight: 700; }
        .percentage-value { color: #ffd966; font-weight: 700; }
        .empty-state {
            text-align: center;
            padding: 80px 30px;
            background: rgba(255,255,255,0.02);
            border-radius: 56px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100,180,255,0.3);
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .premium-card, .chart-lux-card, .premium-table-container {
            animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }
        @media (max-width: 768px) {
            body { padding: 18px; }
            .card-value { font-size: 1.5rem; }
            .card-value.large-number { font-size: 1.2rem; }
            .chart-grid { grid-template-columns: 1fr; }
            .blinking-image { height: 38px; }
            .kpi-grid { grid-template-columns: 1fr; }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0e1a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="header">
    <div class="brand">
        <img src="https://ncbl.coop/ncbl/images/ncbllogo.png" alt="NCBL">
        <h2><i class="fas fa-chart-line" style="margin-right: 10px; color:#3b82f6;"></i>Risk Management Department · FINANCIAL MIS DASHBOARD</h2>
    </div>
    <div class="header-right-decoration">
        <div class="controls">
            <div class="file-upload-wrapper">
                <input type="file" id="fileInput" accept=".xlsx, .xlsm, .xls, .csv">
                <label for="fileInput" class="file-upload-label">
                    <i class="fas fa-cloud-upload-alt"></i> Upload Excel
                </label>
            </div>
            <div id="fileInfo" class="file-info" style="display: none;">
                <i class="fas fa-file-excel"></i> <span id="fileName"></span>
            </div>
            <select id="fromDate" class="glow-select"></select>
            <select id="toDate" class="glow-select"></select>
            <select id="sheetSelect" class="glow-select" style="display:none;"></select>
            <div class="toggle-switch">
                <i class="fas fa-chart-simple"></i>
                <label for="modeToggle">Summary Mode</label>
                <input type="checkbox" id="modeToggle" checked style="width: 18px; height: 18px; cursor:pointer; accent-color:#2effb0;">
            </div>
        </div>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFTBdlE5dAxzUBIxWNb-98THFnwyph_SCS2A&s" 
             alt="Risk Alert" 
             class="blinking-image"
             title="Risk Monitor Active">
    </div>
</div>

<div id="kpis"></div>
<div id="chartSection" class="chart-grid"></div>
<div id="sheetTable"></div>

<script>
   let workbook, dataset = [];
    const nepaliMonths = ["Shrawan", "Bhadra", "Ashwin", "Kartik", "Mangsir", "Poush", "Magh", "Falgun", "Chaitra", "Baisakh", "Jestha", "Ashad"];
    const monthToIndex = {};
    nepaliMonths.forEach((m, idx) => { monthToIndex[m.toLowerCase()] = idx; });
    const monthPattern = new RegExp(`(\\d+(?:st|nd|rd|th)?\\s*)?(${nepaliMonths.join("|")})`, "i");
    
    // Format numbers in original format - no crore/lakh conversion
    function formatNumber(value, isPercentage = false) {
        if (value === undefined || value === null || isNaN(value)) return "0";
        if (isPercentage) {
            return value.toFixed(2) + "%";
        }
        // Show full number with commas for thousands separators
        return value.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    
    function parseSheetDateInfo(sheetName) {
        const match = sheetName.match(monthPattern);
        if (!match) return null;
        const monthName = match[2];
        const monthIdx = monthToIndex[monthName.toLowerCase()];
        if (monthIdx === undefined) return null;
        let numberPart = null;
        if (match[1]) { const numMatch = match[1].match(/(\d+)/); if (numMatch) numberPart = parseInt(numMatch[1], 10); }
        return { sheetName, monthIndex: monthIdx, monthName, sequenceNumber: numberPart };
    }
    
    function sortSheetsByNepaliChronology(sheetNames) {
        const dateSheets = [], nonDateSheets = [];
        for (const name of sheetNames) {
            const parsed = parseSheetDateInfo(name);
            parsed ? dateSheets.push(parsed) : nonDateSheets.push(name);
        }
        dateSheets.sort((a,b) => {
            if (a.monthIndex !== b.monthIndex) return a.monthIndex - b.monthIndex;
            const aSeq = a.sequenceNumber !== null ? a.sequenceNumber : 0, bSeq = b.sequenceNumber !== null ? b.sequenceNumber : 0;
            return aSeq - bSeq;
        });
        return [...dateSheets.map(d => d.sheetName), ...nonDateSheets];
    }
    
    function getDateSheetsOnly() {
        if (!workbook) return [];
        const allSheets = workbook.SheetNames;
        const dateSheets = [];
        for (const name of allSheets) if (parseSheetDateInfo(name)) dateSheets.push(name);
        return sortSheetsByNepaliChronology(dateSheets);
    }

    const fileInput = document.getElementById('fileInput');
    fileInput.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileInfo').style.display = 'inline-flex';
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = new Uint8Array(evt.target.result);
                workbook = XLSX.read(data, { type: 'array', cellDates: true });
                buildDataset();
                populateDropdowns();
                renderAll();
            } catch (error) {
                document.getElementById('kpis').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="font-size: 52px; color: #ff6a6a;"></i><h3>Error Loading File</h3><p>${error.message}</p></div>`;
            }
        };
        reader.readAsArrayBuffer(file);
    };

    modeToggle.onchange = function() {
        const isSummary = modeToggle.checked;
        sheetSelect.style.display = isSummary ? "none" : "inline-block";
        fromDate.style.display = isSummary ? "inline-block" : "none";
        toDate.style.display = isSummary ? "inline-block" : "none";
        if (!isSummary && workbook) populateSheetDropdown();
        renderAll();
    };
    fromDate.onchange = () => renderAll();
    toDate.onchange = () => renderAll();
    sheetSelect.onchange = () => renderAll();

    function find(sheet, keys) {
        if (!sheet || !sheet['!ref']) return 0;
        try {
            const range = XLSX.utils.decode_range(sheet['!ref']);
            for (let R = range.s.r; R <= range.e.r; R++) {
                for (let C = range.s.c; C <= range.e.c; C++) {
                    const cell = sheet[XLSX.utils.encode_cell({ r: R, c: C })];
                    if (!cell) continue;
                    const text = String(cell.v).toLowerCase();
                    if (keys.some(k => text.includes(k.toLowerCase()))) {
                        for (let i = 1; i < 5; i++) {
                            const valCell = sheet[XLSX.utils.encode_cell({ r: R, c: C + i })];
                            if (valCell && valCell.v !== undefined && !isNaN(parseFloat(valCell.v))) return parseFloat(valCell.v);
                        }
                    }
                }
            }
        } catch(e) {}
        return 0;
    }

    function extractWACC(sheet) {
        if (!sheet || !sheet['!ref']) return { deposit: 0, bank: 0, tbill: 0 };
        try {
            const range = XLSX.utils.decode_range(sheet['!ref']);
            let res = { deposit: 0, bank: 0, tbill: 0 };
            for (let R = range.s.r; R <= range.e.r; R++) {
                for (let C = range.s.c; C <= range.e.c; C++) {
                    const cell = sheet[XLSX.utils.encode_cell({ r: R, c: C })];
                    if (!cell) continue;
                    const cellText = String(cell.v).trim().toLowerCase();
                    if (cellText === "deposits" || cellText === "deposit") {
                        const valCell = sheet[XLSX.utils.encode_cell({ r: R, c: C+1 })];
                        if (valCell && valCell.v !== undefined) { let v = parseFloat(String(valCell.v).replace('%','').replace(/,/g,'')); if(!isNaN(v)) { if(String(valCell.v).includes('%')) v/=100; res.deposit=v; } }
                    } else if (cellText === "bankwacc") {
                        const valCell = sheet[XLSX.utils.encode_cell({ r: R, c: C+1 })];
                        if (valCell && valCell.v !== undefined) { let v = parseFloat(String(valCell.v).replace('%','')); if(!isNaN(v)) { if(String(valCell.v).includes('%')) v/=100; res.bank=v; } }
                    } else if (cellText.includes("t-bill") || cellText.includes("tbills")) {
                        const valCell = sheet[XLSX.utils.encode_cell({ r: R, c: C+1 })];
                        if (valCell && valCell.v !== undefined) { let v = parseFloat(String(valCell.v).replace('%','')); if(!isNaN(v)) { if(String(valCell.v).includes('%')) v/=100; res.tbill=v; } }
                    }
                }
            }
            return res;
        } catch(e) { return { deposit:0, bank:0, tbill:0 }; }
    }

    function buildDataset() {
        dataset = [];
        const dateSheets = getDateSheetsOnly();
        dateSheets.forEach(name => {
            const sheet = workbook.Sheets[name];
            if (!sheet) return;
            const wacc = extractWACC(sheet);
            dataset.push({
                date: name,
                deposits: find(sheet, ["deposit"]),
                loans: find(sheet, ["loan"]),
                npl: find(sheet, ["non performing"]),
                nplRatio: find(sheet, ["npl"]),
                liq: find(sheet, ["liquidity"]),
                depAcc: find(sheet, ["deposit account", "deposit a/c"]),
                loanAcc: find(sheet, ["loan account", "loan a/c"]),
                forwarded: find(sheet, ["loan forward", "forwarded", "file forward"]),
                renewed: find(sheet, ["file renewed", "loan renewed", "renewed"]),
                adDitionalTopUp: find(sheet, ["additional-topup/ memo", "topup", "memo"]),
                netNPLtoTotalloan: find(sheet, ["Net Non Performing Loan to Total Loan (Net NPL)"]),
                totalLLPtoTotalloan: find(sheet, ["Total Loan Loss Provision to Total NPL"]),
                waccDeposit: wacc.deposit,
                waccBanKs: wacc.bank,
                waccTbill: wacc.tbill,
                shareCapital: find(sheet, ["share capital", "share capital fund", "capital share"]),
            });
        });
    }

    function populateDropdowns() {
        fromDate.innerHTML = ""; toDate.innerHTML = "";
        if (!dataset.length) { fromDate.innerHTML = '<option>No sheets</option>'; toDate.innerHTML = '<option>No sheets</option>'; return; }
        dataset.forEach(d => { fromDate.add(new Option(d.date, d.date)); toDate.add(new Option(d.date, d.date)); });
        if (dataset.length) toDate.selectedIndex = dataset.length - 1;
    }
    function populateSheetDropdown() { sheetSelect.innerHTML = ""; if(!workbook) return; const sorted = sortSheetsByNepaliChronology(workbook.SheetNames); sorted.forEach(n => sheetSelect.add(new Option(n, n))); if(sheetSelect.options.length) sheetSelect.selectedIndex = sheetSelect.options.length-1; }
    function getFiltered() { if(!dataset.length) return []; const fromIdx = Math.max(0, fromDate.selectedIndex), toIdx = Math.min(dataset.length-1, toDate.selectedIndex); return dataset.slice(fromIdx, toIdx+1); }

    function renderAll() {
        if (!workbook) {
            document.getElementById("kpis").innerHTML = `<div class="empty-state"><i class="fas fa-chart-line" style="font-size: 58px; color:#3b82f6;"></i><h2 style="margin: 20px 0 10px;">RMD Financial Dashboard</h2><p style="opacity:0.8">Upload Excel file with Nepali month sheets (Shrawan, Bhadra...)</p><div style="margin-top: 20px;"><i class="fas fa-arrow-up"></i> Click "Upload Excel" to begin</div></div>`;
            document.getElementById("chartSection").innerHTML = ""; document.getElementById("sheetTable").innerHTML = ""; return;
        }
        document.getElementById("kpis").innerHTML = ""; document.getElementById("chartSection").innerHTML = ""; document.getElementById("sheetTable").innerHTML = "";
        if (modeToggle.checked) renderSummary(); else renderSnapshot();
    }

    function premiumCard(title, value, prevVal, isPct, icon) {
        let numVal = parseFloat(value);
        let numPrev = parseFloat(prevVal);
        let diff = numVal - numPrev;
        let trendClass = diff >= 0 ? "trend-up" : "trend-down";
        let arrow = diff >= 0 ? "↑" : "↓";
        
        // Format the value properly - for percentages, don't multiply again
        let displayValue;
        if (isPct) {
            // Value is already in percentage format (e.g., 0.15 = 15%)
            displayValue = (numVal * 100).toFixed(2) + "%";
        } else {
            displayValue = formatNumber(numVal, false);
        }
        
        let formattedDiff;
        if (isPct) {
            formattedDiff = Math.abs(diff * 100).toFixed(2) + "%";
        } else {
            formattedDiff = formatNumber(Math.abs(diff), false);
        }
        
        // Check if value is large to apply smaller font class
        const isLargeValue = !isPct && numVal > 10000000;
        const largeClass = isLargeValue ? 'large-number' : '';
        
        return `<div class="premium-card"><div class="card-title"><i class="${icon}" style="color:#5bc0ff;"></i> ${title}</div><div class="card-value ${largeClass}">${displayValue}</div>${(prevVal !== undefined && prevVal !== 0 && !isNaN(prevVal)) ? `<div class="trend ${trendClass}"><span>${arrow} ${formattedDiff}</span> vs prior</div>` : '<div class="trend">baseline</div>'}</div>`;
    }

    function renderSummary() {
        const data = getFiltered();
        if (!data.length) { document.getElementById("kpis").innerHTML = '<div class="empty-state">No chronological sheets with Nepali months detected</div>'; return; }
        const last = data[data.length-1], prev = data[data.length-2] || last;
        let kpiHtml = '<div class="kpi-grid">';
        kpiHtml += premiumCard("💰 Deposits", last.deposits, prev.deposits, false, "fas fa-coins");
        kpiHtml += premiumCard("🏦 Loans Portfolio", last.loans, prev.loans, false, "fas fa-chart-line");
        kpiHtml += premiumCard("⚠️ NPL Amount", last.npl, prev.npl, false, "fas fa-exclamation-triangle");
        kpiHtml += premiumCard("📉 NPL Ratio %", last.nplRatio, prev.nplRatio, true, "fas fa-percent");
        // FIXED: Liquidity - don't multiply by 100 if it's already a percentage
        kpiHtml += premiumCard("💧 Liquidity %", last.liq, prev.liq, true, "fas fa-tint");
        kpiHtml += premiumCard("👥 Deposit Accounts", last.depAcc, prev.depAcc, false, "fas fa-users");
        kpiHtml += premiumCard("📑 Loan Accounts", last.loanAcc, prev.loanAcc, false, "fas fa-file-invoice");
        kpiHtml += premiumCard("💵 File Forwarded", last.forwarded, prev.forwarded, false, "fas fa-file-forward");
        kpiHtml += premiumCard("🔄 File Renewed", last.renewed, prev.renewed, false, "fas fa-sync-alt");
        kpiHtml += premiumCard("🔝 Loan Top-up", last.adDitionalTopUp, prev.adDitionalTopUp, false, "fas fa-arrow-up");
        kpiHtml += premiumCard("🏛️ Share Capital", last.shareCapital, prev.shareCapital, false, "fas fa-building");
        kpiHtml += premiumCard("⚠️ Net NPL to Loans %", last.netNPLtoTotalloan, prev.netNPLtoTotalloan, true, "fas fa-chart-simple");
        kpiHtml += premiumCard("🛡️ Provision Coverage %", last.totalLLPtoTotalloan, prev.totalLLPtoTotalloan, true, "fas fa-shield-alt");
        kpiHtml += '</div>'; document.getElementById("kpis").innerHTML = kpiHtml;
        
        const labels = data.map(x=>x.date), container = document.getElementById("chartSection");
        const charts = [
            { title:"📈 Deposit Growth", data:data.map(x=>x.deposits), color:'#2effd0' },
            { title:"📊 Loan Expansion", data:data.map(x=>x.loans), color:'#f9b43a' },
            { title:"⚠️ NPL % Evolution", data:data.map(x=>x.nplRatio*100), color:'#ff8a9f' },
            { title:"💧 Liquidity Ratio", data:data.map(x=>x.liq*100), color:'#aa7eff' },
            { title:"👥 Deposit Accounts", data:data.map(x=>x.depAcc), color:'#6c5ce7' },
            { title:"📑 Loan Accounts", data:data.map(x=>x.loanAcc), color:'#fd79a8' },
            { title:"📤 File Forwarded", data:data.map(x=>x.forwarded), color:'#00cec9' },
            { title:"🔄 File Renewed", data:data.map(x=>x.renewed), color:'#fdcb6e' },
            { title:"🔝 Loan Top-up Trend", data:data.map(x=>x.adDitionalTopUp), color:'#e84393' },
            { title:"🏛️ Share Capital", data:data.map(x=>x.shareCapital), color:'#ffeaa7' },
            { title:"📉 Net NPL Ratio", data:data.map(x=>x.netNPLtoTotalloan*100), color:'#ffb8b8' },
            { title:"🛡️ Provision Coverage", data:data.map(x=>x.totalLLPtoTotalloan*100), color:'#54a0ff' }
        ];
        charts.forEach(ch => {
            const w = document.createElement("div"); w.className = "chart-lux-card";
            const c = document.createElement("canvas"); w.appendChild(c); container.appendChild(w);
            new Chart(c, { type: 'line', data: { labels, datasets: [{ label: ch.title, data: ch.data, borderColor: ch.color, backgroundColor: ch.color+'15', borderWidth: 2.8, pointRadius: 3.5, pointBackgroundColor: '#ffffff', tension: 0.3, fill: true }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#eef5ff' } } } } });
        });
        
        const waccWrap = document.createElement("div"); waccWrap.className = "chart-lux-card";
        const waccC = document.createElement("canvas"); waccWrap.appendChild(waccC); container.appendChild(waccWrap);
        new Chart(waccC, { type: 'line', data: { labels, datasets: [{ label: "Deposit WACC", data: data.map(x=>x.waccDeposit*100), borderColor: '#0ff1ce', tension:0.3, fill:true },{ label: "Banks WACC", data: data.map(x=>x.waccBanKs*100), borderColor: '#ff9966', tension:0.3, fill:true },{ label: "T-Bills WACC", data: data.map(x=>x.waccTbill*100), borderColor: '#f9ca24', tension:0.3, fill:true }] }, options: { responsive: true } });
        
        const combinedWrap = document.createElement("div"); combinedWrap.className = "chart-lux-card";
        const combinedC = document.createElement("canvas"); combinedWrap.appendChild(combinedC); container.appendChild(combinedWrap);
        new Chart(combinedC, { type: 'line', data: { labels, datasets: [{ label:"📂 Forwarded Files", data:data.map(x=>x.forwarded), borderColor:'#00b894', borderWidth:3, pointRadius:4 },{ label:"🔄 Renewed Files", data:data.map(x=>x.renewed), borderColor:'#e17055', borderWidth:3 },{ label:"🔝 Top-up Amount", data:data.map(x=>x.adDitionalTopUp), borderColor:'#e84393', borderWidth:3 }] }, options: { responsive: true, plugins: { legend: { labels:{color:'#fff'} } } } });
    }

    function renderSnapshot() {
        let sheetName = sheetSelect.value;
        if(!workbook || !sheetName) return;
        const sheet = workbook.Sheets[sheetName];
        if(!sheet) return;
        let json = XLSX.utils.sheet_to_json(sheet, { header:1, defval:"" });
        if(!json || json.length===0) { document.getElementById("sheetTable").innerHTML = '<div class="empty-state">✨ No structured data in sheet ✨</div>'; return; }
        const headers = json[0]||[];
        let dataRows = json.slice(1).filter(row=> row && row.some(cell=> cell!=="" && cell!==undefined && cell!==null));
        const nonBlank = headers.map((_,idx)=> dataRows.some(row=> row[idx]!==undefined && row[idx]!==null && row[idx]!=="") ? idx : -1).filter(i=> i!==-1);
        const finalHeaders = nonBlank.map(i=> headers[i]);
        const finalRows = dataRows.map(row=> nonBlank.map(i=> row ? row[i] : ""));
        let html = `<div class="snapshot-header"><div class="snapshot-title"><i class="fas fa-table"></i><h3>🔮 Deep Data Explorer</h3></div><div class="sheet-badge"><i class="fas fa-file-alt"></i> ${escapeHtml(sheetName)} • ${finalRows.length} rows • ${finalHeaders.length} fields</div></div><div class="premium-table-container"><div class="table-wrapper"><table class="premium-table"><thead>tr${finalHeaders.map(h=>`<th>${escapeHtml(String(h||'Field'))}</th>`).join('')}</thead><tbody>`;
        let numericCount=0;
        finalRows.forEach(row=>{
            html+=`<tr>`;
            row.forEach((cell,idx)=>{
                let val = (cell===undefined||cell===null)?"":cell;
                let display = val, style="", align="left";
                if(typeof val === 'number' || (!isNaN(val) && val!=="" && val!==null)){
                    numericCount++;
                    const num = parseFloat(val);
                    const hdr = (finalHeaders[idx]||"").toLowerCase();
                    if(hdr.includes('%')||hdr.includes('ratio')||hdr.includes('rate')||(num>0 && num<1.5 && !hdr.includes('account'))){
                        display = (num*100).toFixed(2)+"%"; style="percentage-value numeric-value"; align="right";
                    } else if(hdr.includes('amount')||hdr.includes('balance')||hdr.includes('deposit')||hdr.includes('loan')||Math.abs(num)>1000){
                        display = formatNumber(num, false); style="currency-value numeric-value"; align="right";
                    } else { display = formatNumber(num, false); style="numeric-value"; align="right"; }
                } else if(typeof val === 'string' && val.trim()!==""){ display = val; style="text-primary"; align="left"; }
                else { display="—"; align="center"; }
                html+=`<td style="text-align:${align}" class="${style}">${escapeHtml(String(display))}</td>`;
            });
            html+=`</tr>`;
        });
        html+=`</tbody></table></div><div class="table-stats" style="padding:18px 24px; background:rgba(0,0,0,0.4); display:flex; gap:20px; font-size:0.8rem;"><i class="fas fa-chart-simple"></i> ${finalRows.length} × ${finalHeaders.length} &nbsp;|&nbsp; <i class="fas fa-calculator"></i> Numeric fields: ${numericCount}</div></div>`;
        document.getElementById("sheetTable").innerHTML = html;
    }
    function escapeHtml(txt){ const d=document.createElement('div'); d.textContent=txt; return d.innerHTML; }
</script>
</body>
</html>
